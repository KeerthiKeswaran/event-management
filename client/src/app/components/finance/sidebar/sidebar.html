<aside class="finance-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <button class="toggle-btn" (click)="toggleSidebar()" aria-label="Toggle Sidebar">
      <svg *ngIf="isCollapsed" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      <svg *ngIf="!isCollapsed" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
    </button>
  </div>
  <nav class="sidebar-nav">
    <a routerLink="/finance/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="sidebar-link" title="Dashboard">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      <span class="link-text">Dashboard</span>
    </a>
    <a routerLink="/finance/transactions" routerLinkActive="active" class="sidebar-link" title="Transactions">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3v18M17 21l-4-4M17 21l4-4M7 21V3M7 3l4 4M7 3L3 7"></path></svg>
      <span class="link-text">Transactions</span>
    </a>
    <a routerLink="/finance/payouts" routerLinkActive="active" class="sidebar-link" title="Payouts">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 22 7 12 2"></polygon><rect x="5" y="9" width="3" height="10"></rect><rect x="16" y="9" width="3" height="10"></rect><rect x="2" y="19" width="20" height="2"></rect></svg>
      <span class="link-text">Payouts</span>
    </a>
    <a routerLink="/finance/escalations" routerLinkActive="active" class="sidebar-link" title="Escalations">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      <span class="link-text">Escalations</span>
    </a>
  </nav>
</aside>
