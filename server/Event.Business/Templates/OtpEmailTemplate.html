<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 480px;
      margin: 40px auto;
      background-color: #ffffff;
      border: 3px solid #000000;
      border-radius: 0px;
      overflow: hidden;
    }
    .header {
      background-color: #8B0000;
      padding: 32px;
      text-align: center;
      border-bottom: 3px solid #000000;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .body {
      padding: 40px;
    }
    .body p {
      color: #000000;
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 20px;
    }
    .otp-box {
      background-color: #000000;
      border: 2px solid #8B0000;
      text-align: center;
      padding: 24px;
      margin: 30px 0;
    }
    .otp-code {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #ffffff;
    }
    .note {
      font-size: 13px;
      color: #000000;
      margin-top: 20px;
      border-left: 3px solid #8B0000;
      padding-left: 12px;
    }
    .footer {
      background-color: #000000;
      color: #ffffff;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      border-top: 3px solid #000000;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><strong style="color: #ffffff; font-weight: 800;">GetMyEvents</strong></h1>
    </div>
    <div class="body">
      <p>Hello,</p>
      <p>Use the one-time passcode below to <strong>{purposeLabel}</strong>:</p>
      <div class="otp-box">
        <div class="otp-code">{otp}</div>
      </div>
      <p class="note">This OTP is valid for 10 minutes and can only be used once. Do not share it with anyone.</p>
      <p class="note">If you did not request this, please ignore this email.</p>
    </div>
    <div class="footer">
      &copy; {year} GetMyEvents. All rights reserved.
    </div>
  </div>
</body>
</html>
